<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0b1120"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grid)" opacity="0.03"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect x="60" y="60" width="340" height="340" rx="20" fill="none" stroke="url(#grad)" stroke-width="4" transform="translate(100,85)"/>
  <rect x="60" y="60" width="340" height="340" rx="20" fill="none" stroke="url(#grad)" stroke-width="4" transform="translate(120,105)" opacity="0.6"/>
  <rect x="100" y="100" width="180" height="180" rx="10" fill="url(#grad)" transform="translate(450,270)"/>
  <rect x="450" y="270" width="180" height="180" rx="10" fill="url(#grad)" opacity="0.7"/>
  <text x="700" y="200" font-family="'Inter','SF Pro',-apple-system,monospace" font-size="110" font-weight="800" fill="white" letter-spacing="-3">&lt;Adar/&gt;</text>
  <text x="700" y="280" font-family="'Inter','SF Pro',-apple-system,sans-serif" font-size="32" fill="#94a3b8">CSS-like styling language</text>
  <text x="700" y="330" font-family="'Inter','SF Pro',-apple-system,sans-serif" font-size="32" fill="#94a3b8">with compile-time type checking</text>
  <text x="700" y="420" font-family="'Inter','SF Pro',-apple-system,monospace" font-size="22" fill="#3b82f6">
    <tspan fill="#93c5fd">$primary</tspan> = <tspan fill="#a5b4fc">#3b82f6</tspan>  <tspan fill="#6ee7b7">.card</tspan> { <tspan fill="#fcd34d">background</tspan>: white }
  </text>
</svg>
